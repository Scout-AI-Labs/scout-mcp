name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC: lets npm trusted publishing mint a short-lived credential
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - name: Publish (no token; authenticates via GitHub OIDC)
        run: npm publish --access public
